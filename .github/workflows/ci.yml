name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── 1. Typo check ──────────────────────────────────────────────────────────
  typos:
    name: Typos
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: crate-ci/typos@v1

  # ── 2. TOML formatting ─────────────────────────────────────────────────────
  taplo:
    name: TOML Formatting
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: uncenter/setup-taplo@v1
      - name: taplo fmt --check
        run: taplo fmt --check

  # ── 3. Rust formatting ─────────────────────────────────────────────────────
  fmt:
    name: Rust Formatting
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - name: cargo fmt — workspace
        run: cargo fmt --all -- --check
      - name: cargo fmt — null-device
        run: cargo fmt --all -- --check
        working-directory: examples/null-device
      - name: cargo fmt — ioctl-echo
        run: cargo fmt --all -- --check
        working-directory: examples/ioctl-echo
      - name: cargo fmt — hid-filter
        run: cargo fmt --all -- --check
        working-directory: examples/hid-filter

  # ── 4. Clippy ──────────────────────────────────────────────────────────────
  clippy:
    name: Clippy
    runs-on: windows-latest
    needs: fmt
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "wdk-safe-clippy"
      - name: cargo clippy — workspace
        run: cargo clippy --all-targets --all-features -- -D warnings

  # ── 5. Tests ───────────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: windows-latest
    needs: clippy
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "wdk-safe-test"
      - name: cargo test — unit + doc + integration
        run: cargo test -p wdk-safe -p wdk-safe-macros -p integration

  # ── 6. Docs ────────────────────────────────────────────────────────────────
  doc:
    name: Docs
    runs-on: windows-latest
    needs: clippy
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "wdk-safe-doc"
      - name: cargo doc
        run: cargo doc --no-deps -p wdk-safe
        env:
          RUSTDOCFLAGS: "-D warnings"