name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── 1. Typos ───────────────────────────────────────────────────────────────
  typos:
    name: Typos
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: taiki-e/install-action@v2
        with:
          tool: typos
      - name: Run typos
        run: typos

  # ── 2. TOML formatting ─────────────────────────────────────────────────────
  taplo:
    name: TOML Formatting
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: taplo-cli
      - name: taplo fmt --check
        run: taplo fmt --check --diff

  # ── 3. Rust formatting ─────────────────────────────────────────────────────
  fmt:
    name: Rust Formatting
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, rust-src
      - name: cargo fmt — workspace
        run: cargo fmt --all -- --check
      - name: cargo fmt — null-device
        run: cargo fmt --all -- --check
        working-directory: examples/null-device
      - name: cargo fmt — ioctl-echo
        run: cargo fmt --all -- --check
        working-directory: examples/ioctl-echo
      - name: cargo fmt — hid-filter
        run: cargo fmt --all -- --check
        working-directory: examples/hid-filter

  # ── 4. Clippy + unused deps ────────────────────────────────────────────────
  clippy:
    name: Clippy
    runs-on: windows-latest
    needs: fmt
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "wdk-safe-clippy"
      - name: cargo clippy — workspace
        run: cargo clippy --all-targets --all-features -- -D warnings
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-machete
      - name: cargo machete — unused deps
        run: cargo machete --skip-target-dir

  # ── 5. Tests ───────────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: windows-latest
    needs: clippy
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "wdk-safe-test"
      - name: cargo test — unit + macros
        run: cargo test -p wdk-safe -p wdk-safe-macros
      - name: cargo test — integration
        run: cargo test
        working-directory: tests/integration

  # ── 6. Docs ────────────────────────────────────────────────────────────────
  doc:
    name: Docs
    runs-on: windows-latest
    needs: clippy
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "wdk-safe-doc"
      - name: cargo doc
        run: cargo doc --no-deps -p wdk-safe
        env:
          RUSTDOCFLAGS: "-D warnings"

  # ── 7. Security audit ──────────────────────────────────────────────────────
  audit:
    name: Cargo Audit
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}