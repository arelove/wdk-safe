name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── 1. Typo check ──────────────────────────────────────────────────────────
  typos:
    name: Typos
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install typos-cli
        run: cargo install typos-cli --locked
      - name: Run typos
        run: typos

  # ── 2. Formatting ──────────────────────────────────────────────────────────
  fmt:
    name: Formatting
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - name: cargo fmt — workspace
        run: cargo fmt --all -- --check
      - name: cargo fmt — examples workspace
        run: cargo fmt --all -- --check
        working-directory: examples

  # ── 3. Clippy ──────────────────────────────────────────────────────────────
  clippy:
    name: Clippy
    runs-on: windows-latest
    needs: fmt
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "wdk-safe-clippy"
      - name: cargo clippy — workspace
        run: cargo clippy --all-targets --all-features -- -D warnings

  # ── 4. Unit tests (host, no WDK required) ─────────────────────────────────
  test:
    name: Unit Tests
    runs-on: windows-latest
    needs: clippy
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "wdk-safe-test"
      - name: cargo test (unit + doc tests)
        run: cargo test -p wdk-safe -p wdk-safe-macros

  # ── 5. Doc tests ───────────────────────────────────────────────────────────
  doctest:
    name: Doc Tests
    runs-on: windows-latest
    needs: clippy
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "wdk-safe-doctest"
      - name: cargo test --doc
        run: cargo test --doc -p wdk-safe